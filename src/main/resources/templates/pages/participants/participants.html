<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>AlproPhysio Participant Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link rel="stylesheet" th:href="@{/css/participants.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        // New Design System Colors
                        "on-background": "#0b1c30",
                        "surface": "#f8f9ff",
                        "primary": "#006b5f",
                        "primary-container": "#14b8a6",
                        "on-primary-container": "#00423b",
                        "surface-container-low": "#eff4ff",
                        "surface-container-high": "#dce9ff",
                        "surface-container-highest": "#d3e4fe",
                        "outline-variant": "#bbcac6",
                        "on-surface-variant": "#3c4947",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        
                        // Old Design Brand Colors (Maintains content compatibility)
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 
                            300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 
                            600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                    }
                }
            }
        }
    </script>
</head>

<body class="text-on-background overflow-x-hidden antialiased flex flex-col min-h-screen">

    <input id="page-dashboard" name="page" type="radio" checked/>
    <input id="page-courses" name="page" type="radio"/>
    <input id="page-catalog" name="page" type="radio"/>
    <input id="page-schedule" name="page" type="radio"/>
    <input id="page-materials" name="page" type="radio"/>
    <input id="page-assessments" name="page" type="radio"/>
    <input id="page-certificates" name="page" type="radio"/>
    <input id="page-feedback" name="page" type="radio"/>
    <input id="page-profile" name="page" type="radio"/>

    <div class="app-shell flex h-screen w-full">

        <aside class="fixed left-0 top-0 h-full w-[280px] hidden lg:flex flex-col bg-surface border-r border-outline-variant py-6 z-30 overflow-y-auto">
            <div class="px-6 mb-8">
                <div class="flex items-center gap-3">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 shrink-0">
                        <defs>
                            <linearGradient id="alproTeal" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#006b5f"/>
                            </linearGradient>
                            <linearGradient id="alproWarm" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#fea619"/><stop offset="100%" stop-color="#f59e0b"/>
                            </linearGradient>
                        </defs>
                        <rect width="100" height="100" rx="24" fill="#eff4ff" />
                        <path d="M 28 76 C 28 50, 42 32, 50 32 C 58 32, 72 50, 72 76" stroke="url(#alproTeal)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M 32 58 Q 50 46 68 58" stroke="url(#alproWarm)" stroke-width="8" stroke-linecap="round"/>
                        <circle cx="50" cy="19" r="7" fill="url(#alproWarm)"/>
                    </svg>
                    <div>
                        <h1 class="text-[18px] font-bold text-primary leading-tight">AlproPhysio</h1>
                        <p class="text-[12px] font-medium text-on-surface-variant">Participant Portal</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-1">
                <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 mt-2">Learning Hub</p>
                
                <label for="page-dashboard" class="nav-dashboard flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200">
                    <span class="material-symbols-outlined text-[22px]">dashboard</span>
                    <span class="text-[14px] font-semibold">Dashboard</span>
                </label>
                <label for="page-courses" class="nav-courses flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200">
                    <span class="material-symbols-outlined text-[22px]">menu_book</span>
                    <span class="text-[14px] font-semibold">My Courses</span>
                </label>
                <label for="page-catalog" class="nav-catalog flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200">
                    <span class="material-symbols-outlined text-[22px]">travel_explore</span>
                    <span class="text-[14px] font-semibold">Browse Catalog</span>
                </label>
                <label for="page-schedule" class="nav-schedule flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200">
                    <span class="material-symbols-outlined text-[22px]">calendar_month</span>
                    <span class="text-[14px] font-semibold">Schedule</span>
                </label>
                
                <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6">Resources & Progress</p>
                
                <label for="page-assessments" class="nav-assessments flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200">
                    <span class="material-symbols-outlined text-[22px]">quiz</span>
                    <span class="text-[14px] font-semibold">Assessments</span>
                </label>
                <label for="page-certificates" class="nav-certificates flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200">
                    <span class="material-symbols-outlined text-[22px]">workspace_premium</span>
                    <span class="text-[14px] font-semibold">Certificates</span>
                </label>

                <p class="px-4 text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6">Account</p>

                <label for="page-feedback" class="nav-feedback flex items-center gap-3 px-4 py-2.5 rounded-lg cursor-pointer text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200">
                    <span class="material-symbols-outlined text-[22px]">rate_review</span>
                    <span class="text-[14px] font-semibold">Feedback</span>
                </label>
            </nav>

            <div class="px-4 mt-6 pt-4 border-t border-outline-variant">
                <button id="logoutBtn" class="flex items-center gap-3 w-full px-4 py-3 rounded-lg text-error hover:bg-error-container transition-colors">
                    <span class="material-symbols-outlined text-[22px]">logout</span>
                    <span class="text-[14px] font-semibold">Logout</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col lg:ml-[280px] w-full min-h-screen overflow-y-auto bg-slate-50">
            
            <header class="flex justify-between items-center w-full px-4 lg:px-8 h-16 z-40 bg-white/80 backdrop-blur-xl border-b border-outline-variant sticky top-0">
                <div class="flex items-center lg:hidden">
                    <h1 class="text-[20px] font-bold text-primary">AlproPhysio</h1>
                </div>
                <div class="hidden lg:block text-sm text-slate-500 font-medium">
                    June 24, 2026
                </div>
                <div class="flex items-center gap-4">
                    <button class="text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>
                    <label for="page-profile" class="cursor-pointer flex items-center gap-3 hover:bg-slate-100 rounded-full p-1 pr-3 transition-colors">
                        <div class="w-8 h-8 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center text-sm font-bold border border-brand-200">JD</div>
                        <span class="text-sm font-medium text-slate-700 hidden sm:block">John Doe</span>
                    </label>
                </div>
            </header>

            <main class="flex-1 p-4 sm:p-6 lg:p-8 pb-24 lg:pb-8 max-w-5xl mx-auto w-full">
                
                <div th:replace="~{pages/participants/participant-dashboard.html}"></div>

                <div th:replace="~{pages/participants/mycourses.html}"></div>

                <div th:replace="~{pages/participants/browse-catalog.html}"></div>

                <div th:replace="~{pages/participants/schedule.html}"></div>

                <div th:replace="~{pages/participants/materials.html}"></div>

                <div th:replace="~{pages/participants/assessment.html}"></div>

                <div th:replace="~{pages/participants/certificates.html}"></div>

                <div th:replace="~{pages/participants/feedback.html}"></div>
                
            </main>
        </div>

        <nav class="fixed bottom-0 left-0 w-full h-16 bg-white/90 backdrop-blur-md border-t border-outline-variant shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] lg:hidden z-50 flex justify-around items-center px-2 pb-safe">
            <label for="page-dashboard" class="mob-nav-dashboard flex flex-col items-center justify-center text-on-surface-variant rounded-xl px-3 py-1 cursor-pointer transition-colors scale-95 duration-100">
                <span class="material-symbols-outlined text-[24px]">dashboard</span>
                <span class="text-[10px] font-semibold mt-0.5">Home</span>
            </label>
            <label for="page-courses" class="mob-nav-courses flex flex-col items-center justify-center text-on-surface-variant rounded-xl px-3 py-1 cursor-pointer transition-colors scale-95 duration-100">
                <span class="material-symbols-outlined text-[24px]">menu_book</span>
                <span class="text-[10px] font-semibold mt-0.5">Courses</span>
            </label>
            <label for="page-schedule" class="mob-nav-schedule flex flex-col items-center justify-center text-on-surface-variant rounded-xl px-3 py-1 cursor-pointer transition-colors scale-95 duration-100">
                <span class="material-symbols-outlined text-[24px]">calendar_month</span>
                <span class="text-[10px] font-semibold mt-0.5">Schedule</span>
            </label>
            <label for="page-materials" class="mob-nav-materials flex flex-col items-center justify-center text-on-surface-variant rounded-xl px-3 py-1 cursor-pointer transition-colors scale-95 duration-100">
                <span class="material-symbols-outlined text-[24px]">folder_copy</span>
                <span class="text-[10px] font-semibold mt-0.5">Materials</span>
            </label>
            <label for="page-profile" class="mob-nav-profile flex flex-col items-center justify-center text-on-surface-variant rounded-xl px-3 py-1 cursor-pointer transition-colors scale-95 duration-100">
                <span class="material-symbols-outlined text-[24px]">person</span>
                <span class="text-[10px] font-semibold mt-0.5">Profile</span>
            </label>
        </nav>

    </div>
    <script th:inline="javascript">
        window.base = /*[[${apiBaseUrl}]]*/ "";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script th:src="@{/js/participant.js}"></script>
    <script th:src="@{/js/toast.js}"></script>
</body>
</html>
