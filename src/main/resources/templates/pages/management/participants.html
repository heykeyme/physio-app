<section id="content-participants" class="page-content space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-slate-800">Participant Statistics</h1>
        <p class="text-sm text-slate-500 mt-1">Enrolment breakdown and engagement overview</p>
    </div>

    <div class="grid gap-4 sm:grid-cols-2 max-w-4xl">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-800 mb-4">Enrolment by Course</h3>
            <div id="enrolmentByCourseContainer" class="space-y-3 text-sm">
                <!-- rows injected by JS -->
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-800 mb-4">Participant Engagement</h3>
            <div class="space-y-3 text-sm">
                <div class="flex justify-between items-center p-3 border-b border-slate-100">
                    <span class="text-slate-600">Total Participants</span>
                    <span id="statTotalParticipants" class="font-bold text-slate-800">0</span>
                </div>
                <div class="flex justify-between items-center p-3 border-b border-slate-100">
                    <span class="text-slate-600">Active Accounts</span>
                    <span id="statActiveParticipants" class="font-bold text-emerald-600">0</span>
                </div>
                <div class="flex justify-between items-center p-3 border-b border-slate-100">
                    <span class="text-slate-600">Inactive Accounts</span>
                    <span id="statInactiveParticipants" class="font-bold text-rose-600">0</span>
                </div>
                <div class="flex justify-between items-center p-3">
                    <span class="text-slate-600">Completed ≥1 Course</span>
                    <span id="statCompletedAtLeastOne" class="font-bold text-slate-800">0</span>
                </div>
            </div>
        </div>
    </div>
</section>
